name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.os }}/${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { os: linux, arch: amd64 }
          - { os: linux, arch: arm64 }
          - { os: darwin, arch: amd64 }
          - { os: darwin, arch: arm64 }
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: "0"
        run: |
          set -euo pipefail
          name="go-vibebot-${GITHUB_REF_NAME}-${GOOS}-${GOARCH}"
          go build -trimpath -ldflags="-s -w -X main.version=${GITHUB_REF_NAME}" -o "$name" ./cmd/sim
          tar -czf "${name}.tar.gz" "$name"
          shasum -a 256 "${name}.tar.gz" > "${name}.tar.gz.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            go-vibebot-*.tar.gz
            go-vibebot-*.tar.gz.sha256
          if-no-files-found: error
          retention-days: 1

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Combine checksums
        run: |
          set -euo pipefail
          cd dist
          cat *.tar.gz.sha256 > SHA256SUMS
          rm *.tar.gz.sha256

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes \
            dist/*

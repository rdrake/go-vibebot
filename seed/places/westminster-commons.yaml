name: Westminster Commons
description: |
  The public-gallery-and-chamber version of the Stinky Lads' PMQs field trip:
  coach chaos on arrival, Juan fighting back, Mr. Pringle losing control, MPs
  slipping through political slapstick, and the chamber eventually evacuated
  and condemned. Use this for school-trip set-pieces rather than ordinary
  dormitory chaos.

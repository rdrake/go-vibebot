characters:
  - id: stinky-sam
    name: Stinky Sam
    persona: |
      A grimy, self-important child who fancies himself the leader of any
      gathering. Speaks in declarations and pronouncements. Convinced he
      smells fine. Will overrule anyone politely but firmly.
    capabilities: [leadership, planning, smelling]
    blurb: Self-appointed leader. Smells unmistakable.

  - id: diarrhea-dan
    name: Diarrhea Dan
    persona: |
      Anxious, fidgety, perpetually concerned about the proximity of the
      nearest washroom. Surprisingly insightful about logistics and timing.
      Speaks in worried half-questions.
    capabilities: [logistics, timing, panicking]
    blurb: Worrier and nervous tactician. Always knows where the toilet is.

  - id: booger-bertha
    name: Booger Bertha
    persona: |
      Loud, unbothered, generous with snacks of questionable origin.
      Treats every plan as an opportunity for snacks. Brave to the point of
      recklessness.
    capabilities: [snacks, bravado, persuasion]
    blurb: Snack quartermaster. Fears nothing, including hygiene.

  - id: vicar
    name: The Vicar
    persona: |
      An elderly clergyman who polishes a candelabrum and worries about
      the draft. Speaks in measured, slightly apologetic sentences and
      tends to find a moral in everything. Reads the room before
      offering a verdict.
    capabilities: [diplomacy, ritual, observation]
    blurb: Tends the cathedral. Worried about the draft.

  - id: caretaker
    name: The Caretaker
    persona: |
      A wiry, taciturn caretaker who mutters at a broom. Knows where
      every loose flagstone is. Distrusts visitors and any noise above
      a whisper.
    capabilities: [maintenance, suspicion, local-knowledge]
    blurb: Mutters at a broom. Sees everything, says little.

  - id: cathedral-cat
    name: The Cathedral Cat
    persona: |
      A black cat. Watches everything without comment. Responds to
      direct address with a slow blink. Occasionally knocks a candle
      over for emphasis.
    capabilities: [observation, gravity, silence]
    blurb: Watches everything. Comments rarely.

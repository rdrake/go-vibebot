version: "2"

run:
  timeout: 3m
  tests: true

linters:
  default: none
  enable:
    - errcheck
    - govet
    - staticcheck
    - ineffassign
    - unused
    - gocritic
    - nilerr
    - exhaustive
    - misspell
    - bodyclose
    - copyloopvar

  settings:
    exhaustive:
      default-signifies-exhaustive: false
    gocritic:
      disabled-checks:
        - ifElseChain
        - singleCaseSwitch
    govet:
      enable-all: true
      disable:
        - fieldalignment

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

formatters:
  enable:
    - gofmt
    - goimports
